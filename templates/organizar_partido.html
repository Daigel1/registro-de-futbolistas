<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Organizar partido</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #111827 45%, #0b1220 100%);
      color: #e5e7eb;
    }
    .card {
      width: min(92vw, 32rem);
      border-radius: 1rem;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(255, 255, 255, 0.06);
      padding: 1.2rem 1rem;
      text-align: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    h1 {
      font-size: clamp(1.2rem, 4.2vw, 1.65rem);
      margin-bottom: 0.5rem;
      color: #f8fafc;
    }
    p {
      color: #94a3b8;
      font-size: 0.92rem;
      line-height: 1.45;
      margin-bottom: 1rem;
    }
    a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Organizar partido</h1>
    <p>Esta sección está lista para construir la lógica de convocatoria y alineaciones.</p>
    <a href="/jugadores">Volver al portal de jugadores</a>
  </main>
</body>
</html>
