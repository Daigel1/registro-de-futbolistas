<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portal de jugadores</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #111827 45%, #0b1220 100%);
      color: #e5e7eb;
    }
    .portal {
      width: min(92vw, 34rem);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 1rem;
      padding: 1.25rem 1rem 1.1rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .top a {
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
    }
    h1 {
      text-align: center;
      font-size: clamp(1.3rem, 4.4vw, 1.8rem);
      margin-bottom: 0.25rem;
      color: #f8fafc;
      letter-spacing: 0.01em;
    }
    .sub {
      text-align: center;
      color: #a1a1aa;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .grid {
      display: grid;
      gap: 0.75rem;
    }
    .card-link {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 0.8rem;
      padding: 0.85rem 0.9rem;
      background: rgba(15, 23, 42, 0.45);
      transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease;
    }
    .card-link:hover {
      transform: translateY(-1px);
      border-color: rgba(125, 211, 252, 0.55);
      background: rgba(30, 41, 59, 0.55);
    }
    .title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.2rem;
      color: #e2e8f0;
    }
    .desc {
      font-size: 0.84rem;
      color: #94a3b8;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main class="portal" aria-label="Portal de jugadores">
    <div class="top">
      <span></span>
      <a href="/registrar">Formulario</a>
    </div>
    <h1>Portal de jugadores</h1>
    <p class="sub">Elige una opción</p>
    <div class="grid">
      <a class="card-link" href="/jugadores/lista">
        <div class="title">Ver la lista de jugadores</div>
        <div class="desc">Consulta, edita, elimina y copia datos de la plantilla registrada.</div>
      </a>
      <a class="card-link" href="/partidos/organizar">
        <div class="title">Organizar partido</div>
        <div class="desc">Prepara alineaciones, convocatoria y planificación del encuentro.</div>
      </a>
    </div>
  </main>
</body>
</html>
